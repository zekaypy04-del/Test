name: Minimal GUI Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Proje Dosyalarını Oluştur
      run: |
        mkdir -p app/src/main/java/com/example/testapp
        mkdir -p app/src/main/res/layout

        echo "sdk.dir=$ANDROID_HOME" > local.properties

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "TestApp"
        include ':app'
        EOF

        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.1.1' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.testapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.testapp"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="Test GUI App"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:gravity="center" android:background="#222222">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Sistem Calisiyor!" android:textColor="#00FF00" android:textSize="24sp" android:textStyle="bold" android:layout_marginBottom="20dp"/>
            <Button android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Test Butonu" android:backgroundTint="#0088FF" android:textColor="#FFFFFF"/>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/java/com/example/testapp/MainActivity.kt
        package com.example.testapp
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
            }
        }
        EOF

    - name: APK'yı Derle
      run: gradle assembleDebug --no-daemon

    - name: APK'yı İndirilebilir Hale Getir
      uses: actions/upload-artifact@v4
      with:
        name: Test-GUI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
